<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — TalentLens AI</title>
  <meta name="description" content="Create your TalentLens AI account" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="design-system.css">
  <style>
    .auth-page {
      min-height: calc(100vh - 70px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
      background: var(--bg);
      position: relative;
      overflow: hidden;
    }
    
    .auth-blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
    }
    .auth-blob-1 {
      width: 500px; height: 500px;
      background: rgba(79,70,229,0.1);
      top: -150px; left: -150px;
    }
    .auth-blob-2 {
      width: 400px; height: 400px;
      background: rgba(124,58,237,0.1);
      bottom: -100px; right: -100px;
    }

    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-hover);
      width: 100%;
      max-width: 480px;
      padding: 3rem 2.5rem;
      position: relative;
      z-index: 1;
    }

    .auth-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .auth-title {
      font-size: 1.75rem;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 0.5rem;
    }

    .auth-subtitle {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      position: relative;
    }

    .input-group label {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text);
    }

    .pw-input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    .pw-input-wrap input {
      padding-right: 2.5rem;
    }

    .pw-toggle {
      position: absolute;
      right: 0.75rem;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }

    .pw-toggle:hover {
      color: var(--text);
    }

    .auth-btn {
      width: 100%;
      margin-top: 1rem;
      justify-content: center;
      padding: 0.85rem;
      font-size: 1rem;
    }

    .auth-footer {
      margin-top: 2rem;
      text-align: center;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .auth-link {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s;
    }

    .auth-link:hover {
      color: var(--secondary);
    }
  </style>
</head>
<body>

  <nav class="navbar" id="main-nav"></nav>

  <div class="auth-page">
    <div class="auth-blob auth-blob-1"></div>
    <div class="auth-blob auth-blob-2"></div>
    
    <div class="auth-card fade-in">
      <div class="auth-header">
        <h1 class="auth-title">Create Account</h1>
        <p class="auth-subtitle">Join TalentLens AI today</p>
      </div>

      <form id="signupForm" class="auth-form">
        <div class="input-group">
          <label for="signupName">Full Name</label>
          <input type="text" id="signupName" class="form-input" placeholder="John Doe" required>
        </div>

        <div class="input-group">
          <label for="signupEmail">Email Address</label>
          <input type="email" id="signupEmail" class="form-input" placeholder="you@example.com" required autocomplete="email">
        </div>
        
        <div class="input-group">
          <label for="signupPassword">Password</label>
          <div class="pw-input-wrap">
            <input type="password" id="signupPassword" class="form-input" placeholder="••••••••" required>
            <button type="button" class="pw-toggle" id="pwToggle1" tabindex="-1"></button>
          </div>
        </div>

        <div class="input-group">
          <label for="signupConfirmPw">Confirm Password</label>
          <div class="pw-input-wrap">
            <input type="password" id="signupConfirmPw" class="form-input" placeholder="••••••••" required>
            <button type="button" class="pw-toggle" id="pwToggle2" tabindex="-1"></button>
          </div>
        </div>

        <button type="submit" class="btn-primary auth-btn" id="signupBtn">
          <span id="signupBtnText">Create Account</span>
          <div class="loading-spinner" id="signupSpinner" style="display:none; width: 18px; height: 18px; border-width: 2px; border-top-color: white;"></div>
        </button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="login.html" class="auth-link">Sign in instead</a>
      </div>
    </div>
  </div>

  <footer class="site-footer" id="main-footer"></footer>

  <script src="shared.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (getToken() && getToken() !== 'undefined') {
        window.location.href = 'index.html';
      }

      const form = document.getElementById('signupForm');
      const btn = document.getElementById('signupBtn');
      const btnText = document.getElementById('signupBtnText');
      const spinner = document.getElementById('signupSpinner');

      const iconEye = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>`;
      const iconEyeOff = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>`;

      const setupPwToggle = (btnId, inputId) => {
        const toggleBtn = document.getElementById(btnId);
        const toggleInput = document.getElementById(inputId);
        if(toggleBtn && toggleInput) {
          toggleBtn.innerHTML = iconEye;
          toggleBtn.addEventListener('click', () => {
            if(toggleInput.type === 'password') {
              toggleInput.type = 'text';
              toggleBtn.innerHTML = iconEyeOff;
            } else {
              toggleInput.type = 'password';
              toggleBtn.innerHTML = iconEye;
            }
          });
        }
      };

      setupPwToggle('pwToggle1', 'signupPassword');
      setupPwToggle('pwToggle2', 'signupConfirmPw');

      if(form) {
        form.addEventListener('submit', async (e) => {
          e.preventDefault();
          const name = document.getElementById('signupName').value.trim();
          const email = document.getElementById('signupEmail').value.trim();
          const password = document.getElementById('signupPassword').value;
          const confirm_password = document.getElementById('signupConfirmPw').value;

          if(password !== confirm_password) {
            showToast('Passwords do not match.', 'error');
            return;
          }
          if(password.length < 8) {
            showToast('Password must be at least 8 characters.', 'error');
            return;
          }

          btn.disabled = true;
          spinner.style.display = 'inline-block';
          btnText.textContent = 'Creating Account...';

          try {
            const res = await fetch(`${API}/auth/signup`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ name, email, password })
            });
            const data = await res.json();
            
            if (!res.ok) {
              if(res.status === 400 && JSON.stringify(data).toLowerCase().includes('email')) {
                 throw new Error('Email already registered.');
              }
              throw new Error(data.detail || data.message || 'Unable to connect to server.');
            }
            
            showToast('Account created successfully! Redirecting...', 'success');
            localStorage.setItem('auth_token', data.data.access_token);
            localStorage.setItem('auth_user', JSON.stringify(data.data.user || { name, email }));
            setTimeout(() => { window.location.href = 'index.html'; }, 1500);
            
          } catch (err) {
            showToast(err.message || 'Unable to create account.', 'error');
            btn.disabled = false;
            spinner.style.display = 'none';
            btnText.textContent = 'Create Account';
          }
        });
      }
    });
  </script>
</body>
</html>
