<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — TalentLens AI</title>
  <meta name="description" content="Sign in to TalentLens AI" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="design-system.css">
  <style>
    .auth-page {
      min-height: calc(100vh - 70px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
      background: var(--bg);
      position: relative;
      overflow: hidden;
    }
    
    .auth-blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
    }
    .auth-blob-1 {
      width: 500px; height: 500px;
      background: rgba(79,70,229,0.1);
      top: -150px; left: -150px;
    }
    .auth-blob-2 {
      width: 400px; height: 400px;
      background: rgba(124,58,237,0.1);
      bottom: -100px; right: -100px;
    }

    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-hover);
      width: 100%;
      max-width: 440px;
      padding: 3rem 2.5rem;
      position: relative;
      z-index: 1;
    }

    .auth-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .auth-icon {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.5rem;
      color: white;
      box-shadow: var(--shadow-btn);
    }

    .auth-title {
      font-size: 1.75rem;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 0.5rem;
    }

    .auth-subtitle {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .input-group label {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text);
    }

    .auth-btn {
      width: 100%;
      margin-top: 1rem;
      justify-content: center;
      padding: 0.85rem;
      font-size: 1rem;
    }

    .auth-footer {
      margin-top: 2rem;
      text-align: center;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .auth-link {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s;
    }

    .auth-link:hover {
      color: var(--secondary);
    }

    .forgot-link {
      font-size: 0.8rem;
      text-align: right;
      display: block;
      margin-top: -0.25rem;
    }
  </style>
</head>
<body>

  <nav class="navbar" id="main-nav"></nav>

  <div class="auth-page">
    <div class="auth-blob auth-blob-1"></div>
    <div class="auth-blob auth-blob-2"></div>
    
    <div class="auth-card fade-in">
      <div class="auth-header">
        <div class="auth-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
          </svg>
        </div>
        <h1 class="auth-title">Welcome Back</h1>
        <p class="auth-subtitle">Sign in to continue to TalentLens AI</p>
      </div>

      <form id="loginForm" class="auth-form">
        <div class="input-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" class="form-input" placeholder="you@example.com" required autocomplete="email">
        </div>
        
        <div class="input-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="form-input" placeholder="••••••••" required autocomplete="current-password">
          <a href="#" class="auth-link forgot-link">Forgot password?</a>
        </div>

        <button type="submit" class="btn-primary auth-btn" id="loginBtn">
          <span id="btnText">Sign In</span>
          <div class="loading-spinner" id="btnSpinner" style="display:none; width: 18px; height: 18px; border-width: 2px; border-top-color: white;"></div>
        </button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="signup.html" class="auth-link">Create an account</a>
      </div>
    </div>
  </div>

  <footer class="site-footer" id="main-footer"></footer>

  <script src="shared.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // If already logged in, redirect to dashboard
      if (getToken() && getToken() !== 'undefined') {
        window.location.href = 'index.html';
      }

      const loginForm = document.getElementById('loginForm');
      if (loginForm) {
        loginForm.addEventListener('submit', async (e) => {
          e.preventDefault();
          
          const email = document.getElementById('email').value.trim();
          const password = document.getElementById('password').value;
          const btn = document.getElementById('loginBtn');
          const btnText = document.getElementById('btnText');
          const spinner = document.getElementById('btnSpinner');

          if (!email || !password) {
            showToast('Please fill out all fields.', 'error');
            return;
          }

          btn.disabled = true;
          btnText.textContent = 'Signing In...';
          spinner.style.display = 'inline-block';

          try {
            const res = await fetch(`${API}/auth/login`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ email, password })
            });
            const data = await res.json();
            
            if (!res.ok) {
              if(res.status === 401) throw new Error('Invalid email or password.');
              throw new Error(data.detail || data.message || 'Unable to connect to server.');
            }
            
            localStorage.setItem('auth_token', data.data.access_token);
            localStorage.setItem('auth_user', JSON.stringify(data.data.user || { name: email.split('@')[0], email }));
            
            showToast('Login successful! Redirecting...', 'success');
            setTimeout(() => { window.location.href = 'index.html'; }, 1500);
            
          } catch (err) {
            showToast(err.message || 'Unable to connect to server.', 'error');
            btn.disabled = false;
            btnText.textContent = 'Sign In';
            spinner.style.display = 'none';
          }
        });
      }
    });
  </script>
</body>
</html>
