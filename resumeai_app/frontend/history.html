<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resume History — TalentLens AI</title>
  <meta name="description" content="Manage your uploaded resumes, ATS scores, and reports." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="design-system.css">
  <style>
    /* ── Header ─────────────────────────────────────────────── */
    .dashboard-header {
      padding: 2.5rem 0 1.5rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .container { max-width: 1280px; margin: 0 auto; padding: 0 1.5rem; }
    .header-content { display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 1rem; margin-bottom: 2rem; }
    .header-title h1 { font-size: 1.75rem; font-weight: 800; color: var(--text); margin-bottom: 0.25rem; letter-spacing: -0.02em; }
    .header-title p { font-size: 0.9rem; color: var(--muted); }
    
    .btn-primary {
      background: var(--primary); color: white; padding: 0.6rem 1.25rem;
      border-radius: var(--radius-md); font-weight: 600; font-size: 0.85rem;
      border: none; cursor: pointer; display: inline-flex; align-items: center; gap: 0.5rem;
      transition: all 0.2s; text-decoration: none; box-shadow: var(--shadow-sm);
    }
    .btn-primary:hover { background: var(--secondary); transform: translateY(-1px); box-shadow: var(--shadow-md); }

    /* ── Stats Cards ─────────────────────────────────────────── */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1rem; }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 1.25rem;
      display: flex; align-items: flex-start; gap: 1rem;
      box-shadow: var(--shadow-sm); transition: transform 0.2s, box-shadow 0.2s;
    }
    .stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
    .stat-icon {
      width: 40px; height: 40px; border-radius: var(--radius-md);
      background: #F3F4F6; display: flex; align-items: center; justify-content: center;
      font-size: 1.25rem; color: var(--text); flex-shrink: 0;
    }
    .stat-info { flex: 1; }
    .stat-value { font-size: 1.5rem; font-weight: 800; color: var(--text); line-height: 1.2; }
    .stat-label { font-size: 0.8rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 0.25rem; }

    /* ── Main Toolbar ────────────────────────────────────────── */
    .main-content { padding: 2rem 0 4rem; flex: 1; }
    .toolbar {
      display: flex; gap: 1rem; margin-bottom: 2rem; align-items: center; flex-wrap: wrap;
    }
    .search-box {
      flex: 1; min-width: 260px; position: relative;
    }
    .search-icon { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 1rem; }
    .search-input {
      width: 100%; background: var(--surface); border: 1px solid var(--border);
      padding: 0.6rem 1rem 0.6rem 2.5rem; border-radius: var(--radius-md);
      font-family: inherit; font-size: 0.9rem; color: var(--text);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79,70,229,0.1); }
    
    .sort-select {
      background: var(--surface); border: 1px solid var(--border);
      padding: 0.6rem 1rem; border-radius: var(--radius-md);
      font-family: inherit; font-size: 0.85rem; font-weight: 500; color: var(--text);
      cursor: pointer; min-width: 180px; transition: border-color 0.2s;
    }
    .sort-select:focus { outline: none; border-color: var(--accent); }

    /* ── Resume Cards Grid ───────────────────────────────────── */
    .resumes-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 1.5rem;
    }
    
    .resume-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); overflow: hidden;
      box-shadow: var(--shadow-sm); transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
      display: flex; flex-direction: column; position: relative;
      animation: fadeIn 0.4s ease-out forwards;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .resume-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); border-color: #D1D5DB; }

    .rc-header {
      padding: 1.25rem; border-bottom: 1px solid var(--border);
      display: flex; align-items: flex-start; gap: 1rem;
    }
    .rc-icon {
      width: 44px; height: 44px; border-radius: var(--radius-md);
      background: #F3F4F6; display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; flex-shrink: 0;
    }
    .rc-title-area { flex: 1; min-width: 0; }
    .rc-filename {
      font-size: 1rem; font-weight: 700; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 0.25rem;
    }
    .rc-date { font-size: 0.75rem; color: var(--muted); font-weight: 500; }
    
    .rc-body { padding: 1.25rem; flex: 1; }
    .rc-metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
    .metric-group { display: flex; flex-direction: column; gap: 0.25rem; }
    .metric-label { font-size: 0.7rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .metric-val { font-size: 0.95rem; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 0.5rem; }
    
    .badge { padding: 0.2rem 0.5rem; border-radius: 99px; font-size: 0.75rem; font-weight: 700; }
    .badge-green { background: #D1FAE5; color: #065F46; }
    .badge-yellow { background: #FEF3C7; color: #92400E; }
    .badge-red { background: #FEE2E2; color: #991B1B; }
    .badge-gray { background: #F3F4F6; color: var(--muted); }

    .rc-footer {
      padding: 1rem 1.25rem; border-top: 1px solid var(--border); background: var(--bg);
      display: flex; gap: 0.75rem;
    }
    .btn-card {
      flex: 1; padding: 0.5rem; border-radius: var(--radius-md);
      font-size: 0.8rem; font-weight: 600; font-family: inherit;
      border: 1px solid transparent; cursor: pointer; transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 0.4rem;
    }
    .btn-view { background: var(--surface); border-color: var(--border); color: var(--text); }
    .btn-view:hover { background: #F3F4F6; }
    .btn-delete { background: transparent; color: var(--muted); }
    .btn-delete:hover { color: var(--danger); background: #FEF2F2; }

    /* ── States ──────────────────────────────────────────────── */
    .skeleton-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); height: 260px;
      padding: 1.25rem; display: flex; flex-direction: column; gap: 1rem;
    }
    .skeleton-el {
      background: #E5E7EB; border-radius: 4px;
      background-image: linear-gradient(90deg, #E5E7EB 0px, #F3F4F6 40px, #E5E7EB 80px);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite linear;
    }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    
    .state-card {
      background: var(--surface); border: 1px dashed var(--border);
      border-radius: var(--radius-lg); padding: 4rem 2rem;
      text-align: center; margin-top: 1rem;
    }
    .state-icon { font-size: 3rem; margin-bottom: 1rem; }
    .state-card h3 { font-size: 1.25rem; font-weight: 700; margin-bottom: 0.5rem; color: var(--text); }
    .state-card p { color: var(--muted); font-size: 0.9rem; margin-bottom: 1.5rem; max-width: 400px; margin-inline: auto; }

    /* ── Modals ──────────────────────────────────────────────── */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(17,24,39,0.7); backdrop-filter: blur(4px);
      z-index: 2000; display: flex; align-items: center; justify-content: center;
      padding: 1.5rem; opacity: 0; pointer-events: none; transition: opacity 0.25s ease;
    }
    .modal-backdrop.open { opacity: 1; pointer-events: all; }
    
    .modal {
      background: var(--surface); border-radius: var(--radius-xl); width: 100%; max-width: 800px;
      max-height: 90vh; display: flex; flex-direction: column;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
      transform: scale(0.95) translateY(10px); transition: transform 0.25s ease;
    }
    .modal-backdrop.open .modal { transform: scale(1) translateY(0); }
    
    .modal-header {
      padding: 1.5rem; border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
    }
    .modal-title { font-size: 1.25rem; font-weight: 800; color: var(--text); }
    .btn-close {
      background: var(--bg); border: none; width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--muted);
      transition: background 0.2s, color 0.2s; font-size: 1.1rem;
    }
    .btn-close:hover { background: #E5E7EB; color: var(--text); }
    
    .modal-body { padding: 1.5rem; overflow-y: auto; flex: 1; }
    
    .modal-footer {
      padding: 1.25rem 1.5rem; border-top: 1px solid var(--border); background: var(--bg);
      display: flex; justify-content: flex-end; gap: 0.75rem; border-radius: 0 0 var(--radius-xl) var(--radius-xl);
    }

    /* Modal Content Styles */
    .detail-section { margin-bottom: 2rem; }
    .detail-section h4 { font-size: 0.85rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 1rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }
    .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; }
    .info-item { display: flex; flex-direction: column; gap: 0.25rem; }
    .info-label { font-size: 0.75rem; color: var(--muted); font-weight: 600; }
    .info-value { font-size: 0.95rem; font-weight: 500; color: var(--text); word-break: break-word; }
    
    .tag-list { display: flex; flex-wrap: wrap; gap: 0.5rem; }
    .tag { background: var(--bg); border: 1px solid var(--border); padding: 0.25rem 0.75rem; border-radius: 99px; font-size: 0.8rem; font-weight: 500; }
    
    .report-card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 1rem; margin-bottom: 0.75rem; }
    .report-card-header { display: flex; justify-content: space-between; margin-bottom: 0.5rem; }

    /* Delete Confirm Modal */
    #confirmModal { max-width: 400px; text-align: center; }
    #confirmModal .modal-body { padding: 2rem; }
    .confirm-icon-wrapper { width: 64px; height: 64px; background: #FEE2E2; color: var(--danger); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.75rem; margin: 0 auto 1.25rem; }
    .confirm-title { font-size: 1.25rem; font-weight: 800; margin-bottom: 0.5rem; }
    .confirm-text { font-size: 0.9rem; color: var(--muted); margin-bottom: 1.5rem; }
    .confirm-actions { display: flex; gap: 1rem; }
    .btn-confirm-cancel { flex: 1; padding: 0.75rem; border: 1px solid var(--border); background: var(--surface); border-radius: var(--radius-md); font-weight: 600; cursor: pointer; transition: background 0.2s; }
    .btn-confirm-cancel:hover { background: var(--bg); }
    .btn-confirm-delete { flex: 1; padding: 0.75rem; border: none; background: var(--danger); color: white; border-radius: var(--radius-md); font-weight: 600; cursor: pointer; transition: background 0.2s; }
    .btn-confirm-delete:hover { background: #DC2626; }

    /* ── Toasts ──────────────────────────────────────────────── */
    .toast-container { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 9999; display: flex; flex-direction: column; gap: 0.75rem; pointer-events: none; }
    .toast {
      background: var(--text); color: white; padding: 0.8rem 1.25rem; border-radius: var(--radius-md);
      font-size: 0.9rem; font-weight: 500; display: flex; align-items: center; gap: 0.75rem;
      box-shadow: var(--shadow-lg); pointer-events: auto;
      animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    .toast.error { border-left: 4px solid var(--danger); }
    .toast.success { border-left: 4px solid var(--success); }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes slideOut { to { transform: translateX(100%); opacity: 0; } }

    /* ── Responsive ──────────────────────────────────────────── */
    @media (max-width: 768px) {
      .header-content { flex-direction: column; align-items: flex-start; }
      .toolbar { flex-direction: column; align-items: stretch; }
      .resumes-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav id="main-nav" class="navbar">
    <!-- Injected via shared.js -->
  </nav>

  <!-- Header -->
  <header class="dashboard-header">
    <div class="container">
      <div class="header-content">
        <div class="header-title">
          <h1>Resume History</h1>
          <p>Manage all uploaded resumes, ATS reports, and job match analyses.</p>
        </div>
        <a href="index.html" class="btn-primary">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
          Upload New Resume
        </a>
      </div>
      
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon">📄</div>
          <div class="stat-info">
            <div class="stat-value" id="statTotal">-</div>
            <div class="stat-label">Total Resumes</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">⭐</div>
          <div class="stat-info">
            <div class="stat-value" id="statAvgAts">-</div>
            <div class="stat-label">Avg ATS Score</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">🎯</div>
          <div class="stat-info">
            <div class="stat-value" id="statAvgJd">-</div>
            <div class="stat-label">Avg JD Match</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">📊</div>
          <div class="stat-info">
            <div class="stat-value" id="statReports">-</div>
            <div class="stat-label">Saved Reports</div>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="main-content">
    <div class="container">
      
      <div class="toolbar">
        <div class="search-box">
          <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
          <input type="text" id="searchInput" class="search-input" placeholder="Search by filename, job title, date..." autocomplete="off">
        </div>
        <select id="sortSelect" class="sort-select">
          <option value="newest">Newest First</option>
          <option value="oldest">Oldest First</option>
          <option value="score_high">Highest ATS Score</option>
          <option value="jd_high">Highest JD Match</option>
          <option value="updated">Recently Updated</option>
          <option value="alpha">Alphabetical</option>
        </select>
      </div>

      <div id="contentArea">
        <!-- Rendered via JS -->
      </div>
      
    </div>
  </main>

  <!-- Detail Modal -->
  <div class="modal-backdrop" id="detailModal">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title">Resume Details</h2>
        <button class="btn-close" onclick="closeModal('detailModal')">✕</button>
      </div>
      <div class="modal-body" id="detailModalBody">
        <!-- Injected via JS -->
      </div>
      <div class="modal-footer" id="detailModalFooter">
        <button class="btn-primary" style="background:var(--surface);color:var(--text);border:1px solid var(--border);" onclick="closeModal('detailModal')">Close</button>
      </div>
    </div>
  </div>

  <!-- Confirm Delete Modal -->
  <div class="modal-backdrop" id="confirmModal">
    <div class="modal" style="max-width: 400px;">
      <div class="modal-body" style="text-align: center; padding: 2rem;">
        <div class="confirm-icon-wrapper">
          <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>
        </div>
        <h3 class="confirm-title">Delete Resume?</h3>
        <p class="confirm-text">This action cannot be undone. All associated reports will be permanently deleted.</p>
        <div class="confirm-actions">
          <button class="btn-confirm-cancel" onclick="closeModal('confirmModal')">Cancel</button>
          <button class="btn-confirm-delete" id="btnConfirmDelete">Delete</button>
        </div>
      </div>
    </div>
  </div>

  <footer class="site-footer" id="main-footer"></footer>

  <script src="shared.js"></script>
  <script>
    let allResumes = [];
    let deleteTargetId = null;
    let searchTimer = null;

    // --- UI States ---
    function renderSkeletons() {
      const area = document.getElementById('contentArea');
      area.innerHTML = `
        <div class="resumes-grid">
          ${[1,2,3].map(() => `
            <div class="skeleton-card">
              <div style="display:flex; gap:1rem; margin-bottom: 1rem;">
                <div class="skeleton-el" style="width:44px; height:44px; border-radius:8px;"></div>
                <div style="flex:1; display:flex; flex-direction:column; gap:0.5rem; justify-content:center;">
                  <div class="skeleton-el" style="width:70%; height:16px;"></div>
                  <div class="skeleton-el" style="width:40%; height:12px;"></div>
                </div>
              </div>
              <div class="skeleton-el" style="width:100%; height:60px; margin-bottom:auto;"></div>
              <div style="display:flex; gap:0.75rem; margin-top:1rem;">
                <div class="skeleton-el" style="flex:1; height:36px; border-radius:8px;"></div>
                <div class="skeleton-el" style="flex:1; height:36px; border-radius:8px;"></div>
              </div>
            </div>
          `).join('')}
        </div>
      `;
    }

    function renderEmptyState(isSearch = false) {
      document.getElementById('contentArea').innerHTML = `
        <div class="state-card">
          <div class="state-icon">📄</div>
          <h3>${isSearch ? 'No resumes match your search' : 'No resumes found'}</h3>
          <p>${isSearch ? 'Try adjusting your search filters or clear the search box.' : 'Upload your first resume to begin tracking ATS scores and job matches.'}</p>
          ${isSearch ? '' : '<a href="index.html" class="btn-primary">Upload Resume</a>'}
        </div>
      `;
    }

    function renderErrorState(title, message, showLogin = false) {
      document.getElementById('contentArea').innerHTML = `
        <div class="state-card">
          <div class="state-icon">⚠️</div>
          <h3>${title}</h3>
          <p>${message}</p>
          ${showLogin ? '<a href="login.html" class="btn-primary">Login Now</a>' : '<button class="btn-primary" onclick="fetchResumes()">Retry</button>'}
        </div>
      `;
    }

    function renderLoginState() {
      document.getElementById('contentArea').innerHTML = `
        <div class="state-card">
          <div class="state-icon">🔒</div>
          <h3>Authentication Required</h3>
          <p>Please login to view your resume history.</p>
          <a href="login.html" class="btn-primary">Login Now</a>
        </div>
      `;
    }

    // --- Helpers ---
    function formatDate(iso) {
      if (!iso) return 'N/A';
      return new Date(iso).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
    }
    
    function getAtsBadge(score) {
      if (score == null) return `<span class="badge badge-gray">N/A</span>`;
      if (score >= 75) return `<span class="badge badge-green">${score}%</span>`;
      if (score >= 50) return `<span class="badge badge-yellow">${score}%</span>`;
      return `<span class="badge badge-red">${score}%</span>`;
    }

    // --- Core Data Fetching ---
    async function fetchResumes() {
      const token = getToken();
      if (!token || token === 'undefined') {
        renderLoginState();
        return;
      }

      renderSkeletons();
      
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 3000);

      try {
        const res = await fetch(`${API}/history/resumes?page=1&page_size=100`, {
          headers: { 'Authorization': 'Bearer ' + token },
          signal: controller.signal
        });

        clearTimeout(timeoutId);

        if (res.status === 401) {
          localStorage.removeItem('auth_token');
          renderErrorState('Session Expired', 'Your session has expired. Please log in again.', true);
          showToast('Session expired.', 'error');
          return;
        }
        if (!res.ok) throw new Error('Failed to fetch from backend.');

        const data = await res.json();
        allResumes = data.data || data.resumes || data.items || [];
        updateStats();
        applyFiltersAndSort();

      } catch (err) {
        if (err.name === 'AbortError') {
          renderErrorState('Request Timeout', 'The server took too long to respond.');
        } else {
          renderErrorState('History service unavailable', err.message || 'Unable to load your resume history.');
          showToast('Unable to load history.', 'error');
        }
      } finally {
        // Any final cleanup if necessary
      }
    }

    // --- Filters & Rendering ---
    function applyFiltersAndSort() {
      let filtered = [...allResumes];
      
      const q = document.getElementById('searchInput').value.toLowerCase();
      if (q) {
        filtered = filtered.filter(r => 
          (r.filename || '').toLowerCase().includes(q) || 
          (r.job_title || '').toLowerCase().includes(q) ||
          formatDate(r.created_at).toLowerCase().includes(q)
        );
      }

      const sort = document.getElementById('sortSelect').value;
      filtered.sort((a, b) => {
        if (sort === 'newest') return new Date(b.created_at) - new Date(a.created_at);
        if (sort === 'oldest') return new Date(a.created_at) - new Date(b.created_at);
        if (sort === 'score_high') return (b.ats_score || 0) - (a.ats_score || 0);
        if (sort === 'jd_high') return (b.jd_score || 0) - (a.jd_score || 0);
        if (sort === 'updated') return new Date(b.updated_at || b.created_at) - new Date(a.updated_at || a.created_at);
        if (sort === 'alpha') return (a.filename || '').localeCompare(b.filename || '');
        return 0;
      });

      renderCards(filtered, !!q);
    }

    function renderCards(resumes, isSearch) {
      if (resumes.length === 0) {
        renderEmptyState(isSearch);
        return;
      }

      const html = resumes.map(r => {
        const jdScore = r.jd_score != null ? getAtsBadge(r.jd_score) : '<span class="badge badge-gray">N/A</span>';
        const totalReports = (r.ats_report_count || 0) + (r.jd_report_count || 0);
        
        return `
          <div class="resume-card" id="card-${r.id}">
            <div class="rc-header">
              <div class="rc-icon">📄</div>
              <div class="rc-title-area">
                <div class="rc-filename" title="${r.filename || 'Untitled'}">${r.filename || 'Untitled Resume'}</div>
                <div class="rc-date">Uploaded ${formatDate(r.created_at)}</div>
              </div>
            </div>
            <div class="rc-body">
              <div class="rc-metrics">
                <div class="metric-group">
                  <span class="metric-label">ATS Score</span>
                  <div class="metric-val">${getAtsBadge(r.ats_score)}</div>
                </div>
                <div class="metric-group">
                  <span class="metric-label">JD Match</span>
                  <div class="metric-val">${jdScore}</div>
                </div>
                <div class="metric-group">
                  <span class="metric-label">Reports</span>
                  <div class="metric-val" style="font-size:1.1rem;">${totalReports}</div>
                </div>
                <div class="metric-group">
                  <span class="metric-label">Last Updated</span>
                  <div class="metric-val" style="font-size:0.8rem; font-weight:500;">${formatDate(r.updated_at || r.created_at)}</div>
                </div>
              </div>
            </div>
            <div class="rc-footer">
              <button class="btn-card btn-view" onclick="openDetail(${r.id})">👁 View</button>
              <button class="btn-card btn-view" onclick="downloadResume(${r.id})">⬇ Download</button>
              <button class="btn-card btn-delete" onclick="promptDelete(${r.id})">🗑 Delete</button>
            </div>
          </div>
        `;
      }).join('');

      document.getElementById('contentArea').innerHTML = `<div class="resumes-grid">${html}</div>`;
    }

    function updateStats() {
      document.getElementById('statTotal').textContent = allResumes.length;
      
      let atsSum = 0, atsCount = 0;
      let jdSum = 0, jdCount = 0;
      let totalReports = 0;

      allResumes.forEach(r => {
        if (r.ats_score != null) { atsSum += r.ats_score; atsCount++; }
        if (r.jd_score != null) { jdSum += r.jd_score; jdCount++; }
        totalReports += (r.ats_report_count || 0) + (r.jd_report_count || 0);
      });

      document.getElementById('statAvgAts').textContent = atsCount > 0 ? Math.round(atsSum / atsCount) + '%' : 'N/A';
      document.getElementById('statAvgJd').textContent = jdCount > 0 ? Math.round(jdSum / jdCount) + '%' : 'N/A';
      document.getElementById('statReports').textContent = totalReports;
    }

    // --- Modals ---
    function openModal(id) { document.getElementById(id).classList.add('open'); }
    function closeModal(id) { document.getElementById(id).classList.remove('open'); }

    async function openDetail(id) {
      const body = document.getElementById('detailModalBody');
      body.innerHTML = `<div style="text-align:center; padding:3rem;"><div class="skeleton-el" style="width:40px;height:40px;border-radius:50%;margin:0 auto 1rem;"></div>Loading details...</div>`;
      openModal('detailModal');

      try {
        const res = await fetch(`${API}/history/resumes/${id}`, { headers: { 'Authorization': 'Bearer ' + getToken() } });
        if (!res.ok) throw new Error('Failed to fetch details');
        const data = (await res.json()).data || {};
        
        const parsed = data.parsed_data || data.parsed_json || {};
        const atsReports = data.ats_reports || [];
        const jdReports = data.jd_reports || [];

        body.innerHTML = `
          <div class="detail-section">
            <h4>Contact Info</h4>
            <div class="info-grid">
              <div class="info-item"><span class="info-label">Name</span><span class="info-value">${parsed.name || '-'}</span></div>
              <div class="info-item"><span class="info-label">Email</span><span class="info-value">${parsed.email || '-'}</span></div>
              <div class="info-item"><span class="info-label">Phone</span><span class="info-value">${parsed.phone || '-'}</span></div>
            </div>
          </div>
          
          <div class="detail-section">
            <h4>Skills</h4>
            <div class="tag-list">
              ${(parsed.skills?.flat_list || []).length > 0 ? parsed.skills.flat_list.map(s => `<span class="tag">${s}</span>`).join('') : '<span class="info-value">No skills found</span>'}
            </div>
          </div>

          <div class="detail-section">
            <h4>ATS Reports (${atsReports.length})</h4>
            ${atsReports.length ? atsReports.map(a => `
              <div class="report-card">
                <div class="report-card-header">
                  <strong>Score: ${getAtsBadge(a.score || a.ats_score)}</strong>
                  <span style="font-size:0.8rem;color:var(--muted);">${formatDate(a.created_at)}</span>
                </div>
                <p style="font-size:0.85rem;color:var(--text);margin-top:0.5rem;">${(a.suggestions || []).slice(0,3).join('<br>') || 'No suggestions'}</p>
              </div>
            `).join('') : '<p class="info-value">No ATS reports available.</p>'}
          </div>

          <div class="detail-section">
            <h4>JD Match Reports (${jdReports.length})</h4>
            ${jdReports.length ? jdReports.map(j => `
              <div class="report-card">
                <div class="report-card-header">
                  <strong>Role: ${j.job_title || 'N/A'} - Match: ${getAtsBadge(j.match_score)}</strong>
                  <span style="font-size:0.8rem;color:var(--muted);">${formatDate(j.created_at)}</span>
                </div>
              </div>
            `).join('') : '<p class="info-value">No JD matches run yet.</p>'}
          </div>
        `;
        
        // Add footer buttons
        document.getElementById('detailModalFooter').innerHTML = `
          <button class="btn-primary" style="background:transparent;color:var(--danger);border:1px solid var(--danger);" onclick="closeModal('detailModal'); promptDelete(${id});">Delete</button>
          <button class="btn-primary" onclick="downloadJSON(${id})">Download JSON</button>
          <button class="btn-primary" style="background:var(--surface);color:var(--text);border:1px solid var(--border);" onclick="closeModal('detailModal')">Close</button>
        `;

      } catch (e) {
        body.innerHTML = `<div class="state-card" style="margin:0;border:none;"><div class="state-icon">⚠️</div><p>${e.message}</p></div>`;
      }
    }

    // --- Delete Flow ---
    function promptDelete(id) {
      deleteTargetId = id;
      openModal('confirmModal');
    }

    document.getElementById('btnConfirmDelete').addEventListener('click', async () => {
      if (!deleteTargetId) return;
      const id = deleteTargetId;
      closeModal('confirmModal');

      try {
        const res = await fetch(`${API}/history/resumes/${id}`, {
          method: 'DELETE',
          headers: { 'Authorization': 'Bearer ' + getToken() }
        });
        if (!res.ok && res.status !== 204) throw new Error('Delete failed');
        
        // Animate out
        const card = document.getElementById(`card-${id}`);
        if(card) {
          card.style.transition = 'all 0.3s';
          card.style.opacity = '0';
          card.style.transform = 'scale(0.9)';
          setTimeout(() => {
            allResumes = allResumes.filter(r => r.id !== id);
            updateStats();
            applyFiltersAndSort();
          }, 300);
        } else {
          allResumes = allResumes.filter(r => r.id !== id);
          updateStats();
          applyFiltersAndSort();
        }
        
        showToast('Resume deleted successfully.', 'success');
      } catch (err) {
        showToast('Failed to delete resume.', 'error');
      }
    });

    // --- Future Actions ---
    function downloadResume(id) {
      downloadJSON(id); // Since we only store parsed JSON, we download that.
    }
    
    async function downloadJSON(id) {
      const resumeListItem = allResumes.find(r => r.id === id);
      if (!resumeListItem) {
        showToast('Resume not found.', 'error');
        return;
      }
      
      try {
        // Fetch the full resume object which includes parsed_json
        const res = await fetch(`${API}/history/resumes/${id}`, {
          headers: { 'Authorization': 'Bearer ' + getToken() }
        });
        if (!res.ok) throw new Error('Failed to fetch full resume data');
        const payload = await res.json();
        
        // Ensure parsed_json is available in the retrieved data
        if (!payload.data || !payload.data.parsed_json) {
          showToast('Parsed resume data is unavailable for this resume.', 'error');
          return;
        }

        const jsonStr = JSON.stringify(payload.data.parsed_json, null, 2);
        const blob = new Blob([jsonStr], { type: 'application/json;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        
        const a = document.createElement('a');
        a.href = url;
        
        // Generate a clean filename: replace spaces with underscores, remove extension
        let safeName = (resumeListItem.filename || 'resume').replace(/\.[^/.]+$/, "").replace(/\s+/g, '_');
        a.download = `${safeName}_parsed.json`;
        
        document.body.appendChild(a);
        a.click();
        
        setTimeout(() => {
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
        }, 100);
      } catch (err) {
        console.error('Download error:', err);
        showToast('Failed to generate download file.', 'error');
      }
    }

    // --- Events ---
    document.getElementById('searchInput').addEventListener('input', () => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(applyFiltersAndSort, 300);
    });

    document.getElementById('sortSelect').addEventListener('change', applyFiltersAndSort);

    // --- Boot ---
    renderNav();
    fetchResumes();

  </script>
</body>
</html>
